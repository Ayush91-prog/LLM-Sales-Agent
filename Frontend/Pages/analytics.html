<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
    <link rel="stylesheet" href="../styles/cards.css">
    <link rel="stylesheet" href="../styles/forms.css">

</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <h2 class="logo">Sales Agent Admin</h2>
            <nav>
                <a href="catalog.html" class="nav-item">
                Catalog
                </a>

            <a href="policies.html" class="nav-item">
                Policies
                </a>

            <a href="orders.html" class="nav-item">
                Orders
                </a>

            <a href="analytics.html" class="nav-item active">
                Analytics
                </a>
            </nav>
        </aside>
        <main class="main">
            <div class="page-header">
                <h1>Business Analytics</h1>
                <p>
                    Track sales performance and top products
                </p>
            </div>
            <section class="card">
                <div class="form-group">
                    <label>Business ID</label>
                    <input 
                          type="number"
                          id="businessId"
                          placeholder="Enter Business ID"
                    />
                    <button
                           id="loadAnalyticsBtn"
                           class="btn-primary"
                           style="margin-top: 15px;"
                    >
                    Load Analytics
                </button>
                </div>
            </section>

            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Total Revenue</h4>
                    <div 
                       class="stat-value"
                       id="totalRevenue"
                    >
                     ₹0
                    </div>
                </div>
                <div class="stat-card">
                    <h4>Total Orders</h4>
                    <div class="stat-value" id="totalOrders">
                        0
                    </div>
                </div>
                <div class="stat-card">
                    <h4>Average Order Value</h4>
                    <div class="stat-value" id="averageOrderValue">
                        ₹0
                    </div>
                </div>
                
            </div>

            <section class="card">
                <div class="card-header">
                    <h3>Top Selling Products</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Sales</th>
                        </tr>
                    </thead>
                    <tbody id="topProductsTable">

                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/analytics.js"></script>
</body>
</html>
