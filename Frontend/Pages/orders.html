<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders</title>

    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
    <link rel="stylesheet" href="../styles/cards.css">
    <link rel="stylesheet" href="../styles/forms.css">

</head>

<body>
    <div class="app">
        <aside class="sidebar">
            <h2 class="logo">Sales Agent Admin</h2>
            <nav>
                <a href="business.html" class="nav-item">
                    Business Setup
                </a>
                <a href="catalog.html" class="nav-item">
                    Catalog
                </a>
                <a href="policies.html" class="nav-item">
                    Policies
                </a>
                <a href="orders.html" class="nav-item active">
                    Orders
                </a>
                <a href="analytics.html" class="nav-item">
                    Analytics
                </a>
            </nav>
        </aside>

        <main class="main">
            <div class="page-header">
                <h1>Orders</h1>
                <p>Manage customer orders and fulfillment</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Total Orders</h4>
                    <div class="stat-value">
                        0
                    </div>
                </div>
                <div class="stat-card">
                    <h4>Total Revenue</h4>
                    <div class="stat-value">
                        ₹0
                    </div>
                </div>
                <div class="stat-card">
                    <h4>Average Order Value</h4>
                    <div class="stat-value">
                        ₹0
                    </div>
                </div>
            </div>

            <section class="card">
                <div class="card-header">
                    <h3>Recent Orders</h3>
                </div>
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer ID</th>
                            <th>Customer Name</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="js/config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/orders.js"></script>
</body>

</html>
